<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Sovatha &amp; Yousa — 22 November 2026</title>
<meta name="description" content="An animated invitation from Sovatha & Yousa — Sunday, 22 November 2026, Pursat." />

<!--
  ══════════════════════════════════════════════════════════════════════
  ANIMATED SCENE INVITATION  (standalone — does not need styles.css/script.js)
  ══════════════════════════════════════════════════════════════════════
  ● THE BACKGROUND IMAGE
      Save the mountain / temple / waterfall picture you shared as:
          public/assets/scene.png
      (any wide-portrait image works). Until then a soft gradient shows
      so the page still looks finished.
      → change the path in  --scene-img  below if you name it differently.

  ● ANIMATED LAYERS (all pure CSS/JS, no libraries):
      · slow ken-burns drift on the scene            (breathes the picture)
      · drifting mist / clouds over the mountains
      · soft god-rays of light
      · a bird that flaps and flies across the sky
      · falling cherry-blossom petals
      · a shimmering waterfall + rising mist at its base
      · twinkling golden fireflies / bokeh
      · names + date reveal with a shine sweep

  ● EDIT the couple copy in the .stage-text block near the bottom.
  ● Respects prefers-reduced-motion (calms everything for those users).
  ══════════════════════════════════════════════════════════════════════
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root{
    /* ← EDIT: point this at your saved image */
    --scene-img: url("assets/scene.png");
    --blush:#e9a6b8;
    --gold:#f4d9a6;
    --ink:#4a3b46;
    --cream:#fff7ef;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:"Nunito Sans", system-ui, sans-serif;
    color:var(--ink);
    background:#f3e6df;
    overflow:hidden;                 /* the hero is a full-screen stage */
  }

  /* ═══════════════ THE STAGE ═══════════════ */
  .scene{
    position:fixed; inset:0;
    overflow:hidden;
    /* soft fallback sky if the image hasn't been dropped in yet */
    background:
      radial-gradient(120% 80% at 50% 8%, #fbf3ee 0%, #f7e3e8 40%, #f0d7cf 70%, #e7c9be 100%);
  }

  /* — the photograph, gently breathing (ken-burns) — */
  .scene-img{
    position:absolute; inset:-4%;
    background-image:var(--scene-img);
    background-size:cover;
    background-position:center 42%;
    will-change:transform;
    animation:kenburns 26s ease-in-out infinite alternate;
  }
  @keyframes kenburns{
    from{ transform:scale(1.04) translate3d(0,0,0); }
    to  { transform:scale(1.12) translate3d(0,-1.4%,0); }
  }

  /* — warm vignette so text always reads — */
  .scene-vignette{
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 30%, transparent 40%, rgba(120,70,60,.18) 100%),
      linear-gradient(to bottom, rgba(255,247,239,.15) 0%, transparent 22%, transparent 55%, rgba(90,50,55,.28) 100%);
  }

  /* ═══════════════ DRIFTING MIST / CLOUDS ═══════════════ */
  .mist{
    position:absolute; left:-30%; width:160%; height:46%; top:6%;
    pointer-events:none; opacity:.55; mix-blend-mode:screen;
    background:
      radial-gradient(60% 70% at 20% 50%, rgba(255,255,255,.9), transparent 60%),
      radial-gradient(50% 60% at 55% 40%, rgba(255,255,255,.7), transparent 60%),
      radial-gradient(55% 65% at 85% 55%, rgba(255,255,255,.8), transparent 60%);
    filter:blur(6px);
    animation:mistDrift 40s linear infinite;
  }
  .mist.m2{ top:2%; height:36%; opacity:.4; animation-duration:64s; animation-direction:reverse; }
  @keyframes mistDrift{
    from{ transform:translateX(-8%); }
    to  { transform:translateX(8%); }
  }

  /* ═══════════════ GOD-RAYS OF LIGHT ═══════════════ */
  .rays{
    position:absolute; top:-20%; left:20%; width:60%; height:110%;
    pointer-events:none; mix-blend-mode:screen; opacity:.5;
    background:
      repeating-linear-gradient(105deg,
        rgba(255,246,224,.0) 0px,
        rgba(255,246,224,.35) 18px,
        rgba(255,246,224,.0) 60px);
    filter:blur(4px);
    transform-origin:top center;
    animation:rayShift 12s ease-in-out infinite alternate;
  }
  @keyframes rayShift{
    from{ opacity:.28; transform:translateX(-3%) skewX(-2deg); }
    to  { opacity:.6;  transform:translateX(3%)  skewX(2deg); }
  }

  /* ═══════════════ WATERFALL SHIMMER + BASE MIST ═══════════════ */
  /* sits over the central cascade; tweak left/width/top to match your image */
  .falls{
    position:absolute; left:42%; top:38%; width:16%; height:34%;
    pointer-events:none; opacity:.6; mix-blend-mode:screen; border-radius:40%;
    background:repeating-linear-gradient(to bottom,
      rgba(255,255,255,.0) 0px,
      rgba(255,255,255,.55) 4px,
      rgba(255,255,255,.0) 12px);
    filter:blur(1.5px);
    animation:fallFlow 1.1s linear infinite;
  }
  @keyframes fallFlow{ from{ background-position-y:0; } to{ background-position-y:16px; } }

  .falls-mist{
    position:absolute; left:38%; top:66%; width:24%; height:16%;
    pointer-events:none; mix-blend-mode:screen; opacity:.0;
    background:radial-gradient(60% 80% at 50% 100%, rgba(255,255,255,.9), transparent 70%);
    filter:blur(8px);
    animation:riseMist 5.5s ease-in-out infinite;
  }
  @keyframes riseMist{
    0%,100%{ opacity:.15; transform:translateY(6px) scale(1); }
    50%    { opacity:.5;  transform:translateY(-8px) scale(1.1); }
  }

  /* ═══════════════ THE BIRD ═══════════════ */
  .bird{
    position:absolute; top:16%; left:-8%;
    width:46px; color:rgba(70,55,60,.75);
    animation:birdPath 22s linear infinite;
    animation-delay:3s;
  }
  .bird svg{ display:block; width:100%; height:auto;
    transform-origin:center; animation:flap .5s ease-in-out infinite; }
  @keyframes flap{
    0%,100%{ transform:scaleY(1); }
    50%    { transform:scaleY(.55); }
  }
  @keyframes birdPath{
    0%   { transform:translate(0,0)        scale(.7); opacity:0; }
    8%   { opacity:.85; }
    50%  { transform:translate(52vw,-6vh)  scale(1);   opacity:.85; }
    92%  { opacity:.85; }
    100% { transform:translate(116vw,4vh)  scale(1.15);opacity:0; }
  }

  /* ═══════════════ PETALS & FIREFLIES (JS-spawned) ═══════════════ */
  .fx{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }

  .petal{
    position:absolute; top:-6%;
    width:14px; height:14px;
    background:radial-gradient(circle at 30% 30%, #fff0f4, var(--blush));
    border-radius:14px 1px 14px 1px;
    opacity:.9;
    animation:petalFall linear infinite;
    will-change:transform;
  }
  @keyframes petalFall{
    0%  { transform:translate(0,-10vh) rotate(0deg); }
    100%{ transform:translate(var(--drift,40px),110vh) rotate(540deg); }
  }

  .firefly{
    position:absolute;
    width:6px; height:6px; border-radius:50%;
    background:radial-gradient(circle, #fff6d8, rgba(244,217,166,.2) 60%, transparent 70%);
    box-shadow:0 0 8px 2px rgba(255,235,180,.7);
    animation:twinkle ease-in-out infinite, floatUp linear infinite;
    will-change:transform,opacity;
  }
  @keyframes twinkle{ 0%,100%{opacity:.15;} 50%{opacity:1;} }
  @keyframes floatUp{
    0%  { transform:translateY(0) translateX(0); }
    100%{ transform:translateY(-24vh) translateX(var(--sway,14px)); }
  }

  /* ═══════════════ TEXT OVERLAY ═══════════════ */
  .stage-text{
    position:absolute; inset:0; z-index:5;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:6vh 8vw;
    pointer-events:none;
  }
  .stage-text > *{ pointer-events:auto; }

  .eyebrow{
    font-size:clamp(.8rem,2.6vw,1rem);
    letter-spacing:.42em; text-transform:uppercase;
    color:#6d5158; opacity:0;
    animation:riseIn 1.2s .5s ease forwards;
    text-shadow:0 1px 8px rgba(255,255,255,.7);
  }

  .names{
    font-family:"Great Vibes", cursive;
    line-height:.9;
    margin:2vh 0 1vh;
    font-size:clamp(3.6rem,15vw,8.5rem);
    color:#fff;
    text-shadow:0 2px 2px rgba(120,70,70,.35), 0 8px 30px rgba(120,70,70,.35);
  }
  .names .n{ display:block; opacity:0; }
  .names .n1{ animation:riseIn 1.3s .8s ease forwards; }
  .names .amp{
    font-family:"Cormorant Garamond", serif; font-style:italic;
    display:block; font-size:.32em; letter-spacing:.05em;
    color:var(--gold); margin:.1em 0;
    opacity:0; animation:riseIn 1.2s 1.1s ease forwards;
    text-shadow:0 2px 10px rgba(120,70,70,.35);
  }
  .names .n2{ animation:riseIn 1.3s 1.35s ease forwards; }

  /* golden shine sweep across the names */
  .names::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(105deg, transparent 40%, rgba(255,255,255,.75) 50%, transparent 60%);
    background-size:250% 100%;
    -webkit-background-clip:text; background-clip:text;
    color:transparent; mix-blend-mode:screen;
    animation:shine 6s 2.6s ease-in-out infinite;
  }

  .date{
    font-family:"Cormorant Garamond", serif;
    font-size:clamp(1.05rem,4.2vw,1.5rem);
    letter-spacing:.16em; color:var(--cream);
    text-shadow:0 1px 10px rgba(120,70,70,.5);
    opacity:0; animation:riseIn 1.2s 1.6s ease forwards;
  }
  .date .dot{ color:var(--gold); margin:0 .5em; }

  .cta{
    margin-top:4vh; opacity:0;
    animation:riseIn 1.2s 2s ease forwards;
  }
  .btn{
    font-family:"Nunito Sans",sans-serif; font-weight:600;
    font-size:clamp(.85rem,3vw,1rem); letter-spacing:.14em;
    text-transform:uppercase; text-decoration:none;
    color:#5a3b40; cursor:pointer;
    padding:.85em 2.4em; border-radius:999px; border:0;
    background:linear-gradient(135deg, #fff7ef, #f6dcc9);
    box-shadow:0 10px 30px rgba(120,70,70,.3), inset 0 0 0 1px rgba(255,255,255,.6);
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .btn:hover{ transform:translateY(-3px) scale(1.03);
    box-shadow:0 16px 40px rgba(120,70,70,.38), inset 0 0 0 1px rgba(255,255,255,.8); }

  /* scroll cue */
  .cue{
    position:absolute; bottom:3.5vh; left:50%; transform:translateX(-50%);
    z-index:5; color:var(--cream); font-size:.72rem; letter-spacing:.32em;
    text-transform:uppercase; text-align:center; opacity:0;
    animation:riseIn 1.2s 2.4s ease forwards; text-shadow:0 1px 8px rgba(120,70,70,.5);
  }
  .cue svg{ display:block; width:22px; margin:.4em auto 0;
    animation:bob 1.8s ease-in-out infinite; }

  @keyframes riseIn{
    from{ opacity:0; transform:translateY(26px); filter:blur(4px); }
    to  { opacity:1; transform:translateY(0);    filter:blur(0); }
  }
  @keyframes shine{ 0%{background-position:180% 0;} 55%,100%{background-position:-80% 0;} }
  @keyframes bob{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(6px);} }

  /* ═══════════════ MUSIC BUTTON ═══════════════ */
  .music{
    position:fixed; top:18px; right:18px; z-index:8;
    width:44px; height:44px; border-radius:50%;
    display:grid; place-items:center; cursor:pointer;
    color:#5a3b40; border:0;
    background:rgba(255,247,239,.7); backdrop-filter:blur(6px);
    box-shadow:0 6px 20px rgba(120,70,70,.25);
    transition:transform .3s ease;
  }
  .music:hover{ transform:scale(1.08); }
  .music svg{ width:20px; height:20px; }
  .music.playing .note{ animation:spin 4s linear infinite; transform-origin:center; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ═══════════════ REDUCED MOTION ═══════════════ */
  @media (prefers-reduced-motion: reduce){
    .scene-img, .mist, .rays, .falls, .falls-mist, .bird, .bird svg,
    .petal, .firefly, .names::after, .cue svg{ animation:none !important; }
    .eyebrow,.names .n,.names .amp,.date,.cta,.cue{
      opacity:1 !important; animation:none !important; }
  }
</style>
</head>
<body>

  <!-- optional background music — drop an mp3 at assets/music.mp3 -->
  <audio id="bgMusic" loop preload="none" src="assets/music.mp3"></audio>
  <button class="music" id="musicBtn" type="button" aria-label="Play music" title="Play music">
    <svg class="note" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </button>

  <!-- ═══════════════ ANIMATED SCENE ═══════════════ -->
  <div class="scene" id="scene">
    <div class="scene-img" id="sceneImg"></div>

    <div class="mist"></div>
    <div class="mist m2"></div>
    <div class="rays"></div>

    <div class="falls"></div>
    <div class="falls-mist"></div>

    <!-- flying bird -->
    <div class="bird" aria-hidden="true">
      <svg viewBox="0 0 64 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
        <path d="M2 14 C14 2 24 2 32 12 C40 2 50 2 62 14"/>
      </svg>
    </div>

    <!-- JS spawns petals + fireflies inside here -->
    <div class="fx" id="fx" aria-hidden="true"></div>

    <div class="scene-vignette"></div>

    <!-- ═══════════ EDIT COUPLE COPY HERE ═══════════ -->
    <div class="stage-text">
      <p class="eyebrow">Together with their families</p>
      <h1 class="names">
        <span class="n n1">Sovatha</span>
        <span class="amp">and</span>
        <span class="n n2">Yousa</span>
      </h1>
      <p class="date">Sunday <span class="dot">·</span> 22 November 2026 <span class="dot">·</span> Pursat</p>
      <div class="cta">
        <!-- points to your full invitation; change href if needed -->
        <a class="btn" href="index.html">Open Invitation</a>
      </div>
    </div>

    <div class="cue">Scroll
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

<script>
  /* ---------- spawn falling petals ---------- */
  const fx = document.getElementById('fx');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function makePetal(){
    const p = document.createElement('span');
    p.className = 'petal';
    const size = 8 + Math.random()*12;
    p.style.left   = Math.random()*100 + 'vw';
    p.style.width  = size + 'px';
    p.style.height = size + 'px';
    p.style.opacity = 0.5 + Math.random()*0.5;
    p.style.setProperty('--drift', (Math.random()*160 - 80) + 'px');
    const dur = 7 + Math.random()*8;
    p.style.animationDuration = dur + 's';
    p.style.animationDelay = -Math.random()*dur + 's';
    // a few paler / whiter petals for variety
    if(Math.random() < 0.3){
      p.style.background = 'radial-gradient(circle at 30% 30%, #ffffff, #f7d9e2)';
    }
    fx.appendChild(p);
    setTimeout(()=>p.remove(), dur*1000 + 500);
  }

  /* ---------- spawn drifting fireflies / bokeh ---------- */
  function makeFirefly(){
    const f = document.createElement('span');
    f.className = 'firefly';
    const size = 3 + Math.random()*5;
    f.style.left = Math.random()*100 + 'vw';
    f.style.top  = (55 + Math.random()*45) + 'vh';   // lower half, near the flowers
    f.style.width = f.style.height = size + 'px';
    f.style.setProperty('--sway', (Math.random()*40 - 20) + 'px');
    const dur = 6 + Math.random()*7;
    f.style.animationDuration = (1.5+Math.random()*2)+'s, '+dur+'s';
    f.style.animationDelay = '0s, '+(-Math.random()*dur)+'s';
    fx.appendChild(f);
    setTimeout(()=>f.remove(), dur*1000 + 500);
  }

  if(!reduce){
    // seed a first wave so it looks alive immediately
    for(let i=0;i<18;i++) makePetal();
    for(let i=0;i<14;i++) makeFirefly();
    setInterval(makePetal, 700);
    setInterval(makeFirefly, 1100);
  }

  /* ---------- graceful fallback if scene.png is missing ---------- */
  (function(){
    const el = document.getElementById('sceneImg');
    const src = getComputedStyle(document.documentElement)
                  .getPropertyValue('--scene-img').replace(/^.*url\(["']?/,'').replace(/["']?\).*$/,'').trim();
    if(!src) return;
    const test = new Image();
    test.onerror = ()=>{ el.style.display='none'; };   // keep the gradient sky
    test.src = src;
  })();

  /* ---------- music toggle ---------- */
  const music = document.getElementById('bgMusic');
  const musicBtn = document.getElementById('musicBtn');
  musicBtn.addEventListener('click', ()=>{
    if(music.paused){
      music.play().then(()=>musicBtn.classList.add('playing'))
        .catch(()=>{ /* no file yet — ignore */ });
    } else {
      music.pause(); musicBtn.classList.remove('playing');
    }
  });
</script>
</body>
</html>
